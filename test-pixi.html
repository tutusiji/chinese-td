<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>PixiJS Test</title>
<style>body{margin:0;background:#111;}</style>
</head>
<body>
<script type="module">
import { Application, Graphics } from '/node_modules/pixi.js/dist/pixi.mjs';

const app = new Application();
await app.init({ width: 800, height: 600, background: '#1a1410' });
document.body.appendChild(app.canvas);

console.log('PixiJS v8 initialized!', app.renderer.name);

// 画一个菱形网格来测试等距渲染
const g = new Graphics();
for (let r = 0; r < 10; r++) {
  for (let c = 0; c < 10; c++) {
    const x = 400 + (c - r) * 32;
    const y = 100 + (c + r) * 16;
    g.moveTo(x, y - 16);
    g.lineTo(x + 32, y);
    g.lineTo(x, y + 16);
    g.lineTo(x - 32, y);
    g.closePath();
    g.fill({ color: 0x3a3428, alpha: 1 });
    g.stroke({ color: 0x554433, width: 1 });
  }
}
app.stage.addChild(g);
console.log('Drawn', 100, 'tiles');
</script>
</body>
</html>
